<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
  <title>LGTM</title>
</head>

<body>
  <div id="app" class="p-4">
    <div v-for="(value, key) in lgtms" class="row mb-4">
        <h1>{{key}}</h1>
      <div v-for="link in value" class="col-2 d-flex flex-column">
        <div :style="{backgroundImage: 'url('+link+')'}" style="background-repeat: no-repeat; background-size: 100%; height: 300px; width: 300px;"></div>
        <input type="text" class="mb-4" onClick="this.setSelectionRange(0, this.value.length)" :value="lgtmFormat(link)" >
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
  <script type="module">
    import {lgtm} from '/links.js'
    const { createApp } = Vue
    createApp({
      data() {
        return {
          lgtms: lgtm
        }
      },
      methods: {
        lgtmFormat(link) {
          return `![LGTM](${link})`
        }
      }
    }).mount('#app')
  </script>
</body>

</html>
